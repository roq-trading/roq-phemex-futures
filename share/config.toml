# config template for the roq-phemex gateway

symbols = [
 "^BTCUSDT$",
 "^BTCPERP$",
]

[accounts]

  [accounts.A1]
  master = true
  login = "YOUR_PHEMEX_API_KEY_GOES_HERE"
  secret = "YOUR_PHEMEX_SECRET_GOES_HERE"
  symbols = [ ".*" ]

[users]

  [users.test]
  password = "1234"
  symbols = ".*"

  [users.trader]
  password = "secret"
  accounts = [ "A1" ]
  symbols = [ "BTCUSDT", "BTCPERP" ]

[rate_limits]

  [rate_limits.global]
    type = "ORDER_ACTION"
    aggregate = true
    request_limit = 100
    monitor_period = "10s"
    ban_period = "5m"
